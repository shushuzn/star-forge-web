<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Star Forge - 星之熔炉</title>
    <style>
      /* 立即显示的加载动画 - 防止黑屏 */
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #080810;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader-sun {
        width: 60px;
        height: 60px;
        background: radial-gradient(circle, #fff 0%, #ffc107 40%, #ffc107 100%);
        border-radius: 50%;
        box-shadow: 0 0 40px rgba(255, 193, 7, 0.6), 0 0 80px rgba(255, 193, 7, 0.3);
        animation: loaderPulse 1.5s ease-in-out infinite;
      }
      .loader-text {
        margin-top: 20px;
        color: #ffc107;
        font-family: 'Segoe UI', sans-serif;
        font-size: 14px;
        letter-spacing: 3px;
        text-transform: uppercase;
        animation: loaderFade 1s ease-in-out infinite alternate;
      }
      @keyframes loaderPulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(255, 193, 7, 0.6), 0 0 80px rgba(255, 193, 7, 0.3); }
        50% { transform: scale(1.1); box-shadow: 0 0 60px rgba(255, 193, 7, 0.8), 0 0 100px rgba(255, 193, 7, 0.5); }
      }
      @keyframes loaderFade {
        from { opacity: 0.5; }
        to { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- 初始加载动画 - 立即显示 -->
    <div id="initial-loader">
      <div class="loader-sun"></div>
      <div class="loader-text">Loading...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // React 加载完成后隐藏初始加载动画
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          var loader = document.getElementById('initial-loader');
          if (loader) loader.classList.add('hidden');
          setTimeout(function() {
            if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
          }, 300);
        }, 500);
      });
    </script>
  </body>
</html>
